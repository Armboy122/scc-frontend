name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8080/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Install Chromium for browser quality gates
        run: npx playwright install --with-deps chromium

      - name: Performance gate (Lighthouse)
        run: npm run test:lighthouse

      - name: Accessibility gate (axe-core)
        run: npm run test:a11y

      - name: Interaction latency gate (INP)
        run: npm run test:vitals

      - name: Mobile device fallback checks
        run: npm run test:device-fallbacks
