<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6d28a8" />
    <title>ออฟไลน์ | Smart Cover Connect</title>
    <style>
      :root { color-scheme: light; font-family: Inter, "Noto Sans Thai", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #1e0a30; color: #1a1625; }
      main { width: min(100%, 420px); padding: 32px 28px; border-radius: 24px; background: #fff; box-shadow: 0 24px 80px rgb(0 0 0 / 0.28); text-align: center; }
      .mark { display: grid; place-items: center; width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 18px; background: #6d28a8; color: #fff; font-size: 30px; line-height: 1; }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 0; color: #6b6783; font-size: 15px; line-height: 1.7; }
      a { display: inline-flex; min-height: 48px; align-items: center; justify-content: center; margin-top: 24px; padding: 0 24px; border-radius: 12px; background: #6d28a8; color: #fff; font-weight: 700; text-decoration: none; }
      a:focus-visible { outline: 3px solid #9455ef; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">&#9889;</div>
      <h1>ยังเชื่อมต่ออินเทอร์เน็ตไม่ได้</h1>
      <p>Smart Cover Connect ไม่เก็บหรือส่งงานภาคสนามแบบออฟไลน์ กรุณาเชื่อมต่ออินเทอร์เน็ต แล้วตรวจสอบข้อมูลก่อนลองอีกครั้ง</p>
      <a href="/">ลองเชื่อมต่ออีกครั้ง</a>
    </main>
  </body>
</html>
